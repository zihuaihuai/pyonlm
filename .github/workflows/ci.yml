name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build + install (with OpenMP)
        env:
          PYONLM_OPENMP: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]
      - name: Verify Cython acceleration core built
        run: python -c "import pyonlm; assert pyonlm.HAVE_CYTHON, 'Cython core did not build'"
      - name: Run tests
        run: python -m pytest -q
